<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="clock.js"></script>
  <style>
    body { padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .dm-layout { display: flex; height: 100vh; overflow: hidden; }

    /* サイドバー */
    .dm-sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--bg-card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .dm-sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; align-items: center;
    }
    .dm-sidebar-header a { color: var(--accent); font-size: 12px; text-decoration: none; }
    .dm-search {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .dm-search input {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--input-bg); color: var(--text); font-size: 13px; font-family: var(--font);
      box-sizing: border-box;
    }
    .dm-search input:focus { outline: none; border-color: var(--accent); }
    .dm-user-list { flex: 1; overflow-y: auto; }
    .dm-user-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.15s; display: flex; align-items: center; gap: 10px;
    }
    .dm-user-item:hover { background: var(--tr-hover); }
    .dm-user-item.active { background: var(--accent-pale); }
    .dm-user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--accent);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .dm-user-info { overflow: hidden; }
    .dm-user-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dm-user-id   { font-size: 11px; color: var(--text-sub); }

    /* メインチャット */
    .dm-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dm-chat-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card);
      font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px;
    }
    .dm-chat-header .back-btn {
      display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text);
    }
    .dm-messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px;
      background: var(--bg);
    }
    .dm-empty { text-align: center; color: var(--text-sub); font-size: 13px; margin-top: 40px; }
    .dm-msg { display: flex; gap: 8px; max-width: 80%; }
    .dm-msg.mine { align-self: flex-end; flex-direction: row-reverse; }
    .dm-bubble {
      padding: 9px 13px; border-radius: 16px; font-size: 13px; line-height: 1.6;
      word-break: break-word; white-space: pre-wrap;
    }
    .dm-msg.mine .dm-bubble  { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .dm-msg.other .dm-bubble { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .dm-time { font-size: 10px; color: var(--text-sub); align-self: flex-end; white-space: nowrap; }
    .dm-msg.mine .dm-time { text-align: right; }

    .dm-input-area {
      padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-card);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .dm-input-area textarea {
      flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--font); font-size: 13px; resize: none; min-height: 40px; max-height: 120px;
      background: var(--input-bg); color: var(--text); overflow-y: auto;
    }
    .dm-input-area textarea:focus { outline: none; border-color: var(--accent); }
    .dm-send-btn {
      padding: 9px 16px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-family: var(--font);
      white-space: nowrap;
    }
    .dm-send-btn:hover { background: var(--accent-dark); }

    .dm-no-select { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-sub); font-size: 14px; }

    @media (max-width: 600px) {
      .dm-sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; transition: transform 0.3s; }
      .dm-sidebar.hidden { transform: translateX(-100%); }
      .dm-main { width: 100%; }
      .dm-chat-header .back-btn { display: block; }
    }
  </style>
</head>
<body>
<div id="clock"></div>
<button id="toggleBtn">🌙</button>

<div class="dm-layout">
  <!-- サイドバー -->
  <div class="dm-sidebar" id="sidebar">
    <div class="dm-sidebar-header">
      <span>💬 DM</span>
      <a href="/">掲示板へ</a>
    </div>
    <div class="dm-search">
      <input type="text" id="search-input" placeholder="ユーザー名・IDで検索...">
    </div>
    <div class="dm-user-list" id="user-list">
      <div class="dm-empty">ログインしてください</div>
    </div>
  </div>

  <!-- メイン -->
  <div class="dm-main">
    <div class="dm-chat-header">
      <button class="back-btn" id="back-btn">←</button>
      <span id="chat-header-name">相手を選んでください</span>
    </div>
    <div class="dm-messages" id="messages">
      <div class="dm-empty" id="no-select">左のリストから相手を選んでください</div>
    </div>
    <div class="dm-input-area" id="input-area" style="display:none;">
      <textarea id="dm-input" placeholder="メッセージを入力（Enterで送信）" rows="1"></textarea>
      <button class="dm-send-btn" id="dm-send">送信</button>
    </div>
  </div>
</div>

<script>
var SERVER  = 'https://yuyuyu-made-bbs-server.onrender.com';
var token   = localStorage.getItem('bbs_token') || '';
var myDmId  = localStorage.getItem('bbs_dm_id') || '';
var currentPeer = null;
var ws = null;

// ダークモード
(function(){
  function applyDark(dark) {
    document.documentElement.setAttribute('data-theme', dark?'dark':'light');
    var btn=document.getElementById('toggleBtn'); if(btn) btn.textContent=dark?'☀️':'🌙';
    localStorage.setItem('darkmode', dark?'true':'false');
  }
  var saved=localStorage.getItem('darkmode');
  var pref=window.matchMedia('(prefers-color-scheme: dark)');
  applyDark(saved!==null ? saved==='true' : pref.matches);
  pref.addEventListener('change',function(e){ if(localStorage.getItem('darkmode')===null) applyDark(e.matches); });
  document.getElementById('toggleBtn').addEventListener('click',function(){
    applyDark(document.documentElement.getAttribute('data-theme')!=='dark');
  });
  var color=localStorage.getItem('bbs_themeColor')||'#7c57c2';
  var r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  var tc=(r*0.299+g*0.587+b*0.114)<128?'#fff':'#222';
  document.documentElement.style.setProperty('--accent',color);
  document.documentElement.style.setProperty('--th-bg',color);
  document.documentElement.style.setProperty('--th-text',tc);
})();

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(iso) {
  var d = new Date(iso);
  return d.getMonth()+1 + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

async function api(path, options) {
  var r = await fetch(SERVER + path, Object.assign({
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
  }, options||{}));
  return r.json();
}

// ユーザー一覧表示
function renderUserList(users) {
  var list = document.getElementById('user-list');
  if (!users.length) { list.innerHTML = '<div class="dm-empty">ユーザーが見つかりません</div>'; return; }
  list.innerHTML = users.map(function(u) {
    return '<div class="dm-user-item" data-dmid="' + esc(u.dm_id) + '" data-name="' + esc(u.username) + '" data-bbsid="' + esc(u.bbs_id||'') + '">' +
      '<div class="dm-user-avatar">' + esc(u.username[0].toUpperCase()) + '</div>' +
      '<div class="dm-user-info"><div class="dm-user-name">' + esc(u.username) + '</div>' +
      '<div class="dm-user-id">' + esc(u.dm_id) + '</div></div>' +
      '</div>';
  }).join('');
  list.querySelectorAll('.dm-user-item').forEach(function(el) {
    el.addEventListener('click', function() { openChat(el.dataset.dmid, el.dataset.name, el.dataset.bbsid); });
  });
}

async function loadUsers(q) {
  if (!token) return;
  var d = await api('/dm/users' + (q ? '?q=' + encodeURIComponent(q) : ''));
  renderUserList(d.users || []);
}

// チャット開く
async function openChat(dmId, username, bbsId) {
  currentPeer = { dm_id: dmId, username: username, bbs_id: bbsId };

  document.querySelectorAll('.dm-user-item').forEach(function(el) { el.classList.remove('active'); });
  var activeEl = document.querySelector('[data-dmid="' + dmId + '"]');
  if (activeEl) activeEl.classList.add('active');

  document.getElementById('chat-header-name').textContent = username + ' (' + dmId + ')';
  document.getElementById('no-select').style.display = 'none';
  document.getElementById('input-area').style.display = 'flex';

  // スマホ: サイドバー隠す
  if (window.innerWidth <= 600) {
    document.getElementById('sidebar').classList.add('hidden');
  }

  await loadMessages();
}

function bubbleHtml(msg) {
  var mine = msg.sender_dm === myDmId;
  return '<div class="dm-msg ' + (mine?'mine':'other') + '">' +
    '<div class="dm-bubble">' + esc(msg.content) + '</div>' +
    '<div class="dm-time">' + fmtTime(msg.time) + '</div>' +
    '</div>';
}

async function loadMessages() {
  if (!currentPeer) return;
  var d = await api('/dm/' + currentPeer.dm_id);
  var msgs = d.messages || [];
  var el = document.getElementById('messages');
  el.innerHTML = msgs.length ? msgs.map(bubbleHtml).join('') : '<div class="dm-empty">メッセージはまだありません</div>';
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  var input = document.getElementById('dm-input');
  var content = input.value.trim();
  if (!content || !currentPeer) return;
  input.value = '';
  input.style.height = '';
  var d = await api('/dm/' + currentPeer.dm_id, { method: 'POST', body: JSON.stringify({ content }) });
  if (d.message) {
    var el = document.getElementById('messages');
    var empty = el.querySelector('.dm-empty');
    if (empty) empty.remove();
    el.insertAdjacentHTML('beforeend', bubbleHtml(d.message));
    el.scrollTop = el.scrollHeight;
  }
}

// WebSocket
function connectWS() {
  var wsUrl = SERVER.replace(/^https/, 'wss').replace(/^http/, 'ws');
  ws = new WebSocket(wsUrl);
  ws.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'dm' && currentPeer && data.room_id.includes(currentPeer.dm_id)) {
        if (data.message.sender_dm !== myDmId) {
          var el = document.getElementById('messages');
          var empty = el.querySelector('.dm-empty');
          if (empty) empty.remove();
          el.insertAdjacentHTML('beforeend', bubbleHtml(data.message));
          el.scrollTop = el.scrollHeight;
        }
      }
    } catch(err) {}
  };
  ws.onclose = function() { setTimeout(connectWS, 3000); };
}

// 送信ボタン・Enter
document.getElementById('dm-send').addEventListener('click', sendMessage);
document.getElementById('dm-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
// テキストエリアの自動高さ
document.getElementById('dm-input').addEventListener('input', function() {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// 検索
var searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var q = this.value.trim();
  searchTimer = setTimeout(function() { loadUsers(q); }, 300);
});

// バックボタン（スマホ）
document.getElementById('back-btn').addEventListener('click', function() {
  document.getElementById('sidebar').classList.remove('hidden');
  currentPeer = null;
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('chat-header-name').textContent = '相手を選んでください';
});

// ログインチェック・初期化
(async function() {
  if (!token) {
    document.getElementById('user-list').innerHTML = '<div class="dm-empty"><a href="account.html" style="color:var(--accent);">ログインが必要です</a></div>';
    return;
  }
  var me = await api('/account/me');
  if (me.error) {
    localStorage.removeItem('bbs_token');
    location.href = 'account.html';
    return;
  }
  myDmId = me.dm_id;
  localStorage.setItem('bbs_dm_id', myDmId);
  await loadUsers();

  // URLハッシュからDMを自動で開く
  var hash = location.hash.replace('#', '');
  if (hash) {
    var d = await api('/dm/users?q=' + encodeURIComponent(hash));
    var u = (d.users||[]).find(function(u){ return u.dm_id === hash; });
    if (u) openChat(u.dm_id, u.username, u.bbs_id);
  }

  connectWS();
})();
</script>
</body>
</html>
