<script src="https://cdn.tailwindcss.com"></script>

<!-- header -->
<header class="p-4 bg-slate-900 shadow text-xl font-bold text-center">
掲示板
</header>

<!-- topic -->
<div id="topic" class="text-center text-sm text-gray-400 py-2"></div>

<!-- posts -->
<div id="posts" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

<!-- form -->
<div class="p-3 bg-slate-900 border-t border-slate-700">
  <div class="flex gap-2 mb-2">
    <input id="name" placeholder="名前"
      class="flex-1 p-2 rounded bg-slate-800">
    <input id="pass" placeholder="パスワード"
      class="flex-1 p-2 rounded bg-slate-800">
  </div>
  <textarea id="content" placeholder="本文"
    class="w-full p-2 rounded bg-slate-800 mb-2"></textarea>
  <button onclick="send()"
    class="w-full bg-indigo-500 hover:bg-indigo-600 p-2 rounded">
    投稿
  </button>
</div>
